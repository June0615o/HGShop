# ============================================================
# 智汇优品 — Nginx 反向代理配置
# 适用：Ubuntu/Debian，Nginx 1.18+
# 存放路径：/etc/nginx/sites-available/smartpick
# ============================================================

server {
    listen 80;
    server_name _;                          # 替换为你的域名或公网 IP

    # 日志
    access_log /var/log/nginx/smartpick_access.log;
    error_log  /var/log/nginx/smartpick_error.log;

    # 客户端上传大小限制
    client_max_body_size 10M;

    # ── 静态文件直接由 Nginx 处理 ──
    location /static/ {
        alias /opt/smartpick/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── 反向代理到 Gunicorn ──
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
