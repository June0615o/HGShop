# ============================================================
# 惠购商城 — Docker Compose 部署
# ============================================================
services:
  app:
    build: .
    container_name: hgshop-app
    restart: always
    environment:
      - PYTHONIOENCODING=utf-8
      - SECRET_KEY=${SECRET_KEY:-hgshop-production-secret-change-me}
      - MAIL_USERNAME=${MAIL_USERNAME:-}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}
    volumes:
      - hgshop_data:/app/data
      - hgshop_static:/app/static
    networks:
      - hgshop_net

  nginx:
    image: nginx:1.27-alpine
    container_name: hgshop-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx-docker.conf:/etc/nginx/conf.d/default.conf:ro
      - hgshop_static:/app/static:ro
    depends_on:
      - app
    networks:
      - hgshop_net

volumes:
  hgshop_data:
  hgshop_static:

networks:
  hgshop_net:
    driver: bridge
