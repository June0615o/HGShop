# ============================================================
# 智汇优品 — Docker Compose 部署
# ============================================================
services:
  app:
    build: .
    container_name: smartpick-app
    restart: always
    environment:
      - PYTHONIOENCODING=utf-8
      - SECRET_KEY=${SECRET_KEY:-smartpick-production-secret-change-me}
      - MAIL_USERNAME=${MAIL_USERNAME:-}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}
    volumes:
      - smartpick_data:/app/data
      - smartpick_static:/app/static
    networks:
      - smartpick_net

  nginx:
    image: nginx:1.27-alpine
    container_name: smartpick-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx-docker.conf:/etc/nginx/conf.d/default.conf:ro
      - smartpick_static:/app/static:ro
    depends_on:
      - app
    networks:
      - smartpick_net

volumes:
  smartpick_data:
  smartpick_static:

networks:
  smartpick_net:
    driver: bridge
