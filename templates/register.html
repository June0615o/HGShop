{% extends "base.html" %}
{% block title %}注册 - 惠购商城{% endblock %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow">
                <div class="card-body p-4">
                    <h3 class="text-center mb-4">用户注册</h3>
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">用户名 <span class="text-danger">*</span></label>
                            <input type="text" name="username" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">邮箱 <span class="text-danger">*</span></label>
                            <input type="email" name="email" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">所在地区</label>
                            <input type="text" name="region" class="form-control" placeholder="如：北京、上海、广州">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">密码 <span class="text-danger">*</span></label>
                            <input type="password" name="password" class="form-control" required minlength="6">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">确认密码 <span class="text-danger">*</span></label>
                            <input type="password" name="confirm" class="form-control" required minlength="6">
                        </div>
                        <button type="submit" class="btn btn-primary w-100">注 册</button>
                    </form>
                    <div class="text-center mt-3">
                        <small>已有账号？<a href="{{ url_for('login') }}">去登录</a></small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
